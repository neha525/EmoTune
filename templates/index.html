<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmoTune - Speech Emotion and Music</title>
  <meta name="description" content="Real-time speech emotion recognition with AI-powered music recommendations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <!-- Confetti canvas (hidden by default) -->
  <canvas id="confettiCanvas"
    style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none;"></canvas>

  <!-- Animated background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="layout">

    <!-- LEFT SIDEBAR: Session History -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/" class="btn btn-home">Home</a>
        <span class="sidebar-icon">&#128337;</span>
        <h2>History</h2>
        <button type="button" class="btn-icon" id="clearHistoryBtn" title="Clear history">&#128465;</button>
      </div>
      <div class="history-list" id="historyList">
        <p class="empty-msg">No sessions yet.</p>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- Hero -->
      
      <header class="hero">
        <div style="position:absolute; top:20px; left:20px;">
            <a href="/">
              
            </a>
        </div>

         <h1 class="hero-title">EmoTune</h1>
         <p class="hero-sub">Detect your emotion from voice & get perfect music recommendations</p>
       </header>

      <!-- Input Card -->
      <section class="card input-card" id="inputCard">

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon" id="dropIcon">&#127908;</div>
          <p class="drop-text">Drop an audio file here</p>
          <p class="drop-sub">WAV &bull; MP3 &bull; OGG &bull; M4A &bull; FLAC</p>
          <div class="btn-row">
            <label class="btn btn-primary" for="fileInput" id="uploadLabel">
              <span>&#128194; Upload Audio</span>
              <input type="file" id="fileInput"
                accept=".wav,.mp3,.ogg,.m4a,.flac,audio/wav,audio/mpeg,audio/ogg,audio/mp4,audio/flac" hidden />
            </label>
            <button type="button" class="btn btn-mic" id="micBtn">&#127908; Record</button>
          </div>
          <p class="file-name-label" id="fileNameLabel"></p>
        </div>

        <!-- Audio Preview Player -->
        <div class="audio-preview" id="audioPreview" style="display:none">
          <audio id="audioPlayer" controls></audio>
        </div>

        <!-- Waveform / Status -->
        <div class="waveform-container" id="waveformContainer" style="display:none">
          <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
          <div class="recording-badge" id="recordingBadge">
            <span class="rec-dot"></span> Recording...
          </div>
        </div>

        <!-- Record timer -->
        <div class="record-controls" id="recordControls" style="display:none">
          <span class="timer-label" id="timerLabel">0s</span>
          <button type="button" class="btn btn-stop" id="stopBtn">&#9209; Stop</button>
        </div>

        <!-- Analyse button -->
        <button type="button" class="btn btn-analyse" id="analyseBtn" style="display:none">
          &#9889; Analyse Emotion
        </button>
      </section>

      <!-- Loading -->
      <div class="loading-card" id="loadingCard" style="display:none">
        <div class="spinner"></div>
        <p>Analysing your voice...</p>
      </div>

      <!-- Results -->
      <section class="results-section" id="resultsSection" style="display:none">

        <!-- Emotion Result -->
        <div class="card emotion-card" id="emotionCard">
          <div class="emotion-emoji" id="emotionEmoji"></div>
          <div class="emotion-info">
            <h2 class="emotion-label" id="emotionLabel"></h2>
            <p class="emotion-sub">Detected Emotion</p>
          </div>
        </div>

        <!-- Probability Bars -->
        <div class="card prob-card">
          <h3 class="card-title">Probability Breakdown</h3>
          <div class="prob-grid" id="probGrid"></div>
        </div>

        <!-- Song Recommendations -->
        <div class="card songs-card">
          <h3 class="card-title">&#127925; Recommended Songs</h3>
          <div class="songs-list" id="songsList"></div>
        </div>

        <!-- Analyse Again -->
        <button type="button" class="btn btn-again" id="analyseAgainBtn">&#8617; Analyse Another</button>
      </section>

    </main>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
